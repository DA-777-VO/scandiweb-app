services:
  # Наш PHP-сервер (бэкенд)
  app:
    build:
      context: ./scandiwebBackend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./scandiwebBackend/:/app
    env_file:
      - ./scandiwebBackend/.env
    depends_on:
      - db

  # Сервис базы данных MySQL
  db:
    image: mysql:8.4.8
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: scandiweb
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      # ВОТ ИЗМЕНЕНИЕ:
      # Мы монтируем папку ./data/db с твоего компьютера в папку /var/lib/mysql внутри контейнера
      - ./data/db:/var/lib/mysql
      - ./scandiwebBackend/database/migrate.sql:/docker-entrypoint-initdb.d/migrate.sql